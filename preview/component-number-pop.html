<!-- @dsCard group="Components" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(ellipse 75% 65% at 50% 45%,#11141c,#07080d 70%);padding:24px;display:flex;align-items:center;justify-content:center;min-height:100%}
  .np{display:flex;flex-direction:column;align-items:center;gap:14px}
  .ic{width:64px;height:64px;color:#9BD1FF;filter:drop-shadow(0 12px 40px rgba(91,140,255,.5))}
  .ic svg{width:64px;height:64px}
  .num{font-family:'Instrument Serif',serif;font-size:140px;line-height:.86;color:#EEF2FB;letter-spacing:-0.02em;text-shadow:0 10px 60px rgba(0,0,0,.55);font-variant-numeric:tabular-nums}
  .num .u{font-size:.42em;color:#9BD1FF;margin-left:6px}
  .chip{display:inline-flex;align-items:center;gap:10px;padding:9px 20px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:600;font-size:20px;letter-spacing:.2em;text-transform:uppercase;color:#EEF2FB;backdrop-filter:blur(6px)}
  .dot{width:9px;height:9px;border-radius:50%;background:#5B8CFF}
</style></head>
<body>
  <div class="np">
    <div class="ic"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 32l10-10 8 7 12-15"/><path d="M30 14h8v8"/></svg></div>
    <div class="num">100<span class="u">%</span></div>
    <div class="chip"><span class="dot"></span>SECURE</div>
  </div>
</body></html>

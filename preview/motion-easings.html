<!-- @dsCard group="Spacing" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0A0C12;color:#EEF2FB;padding:24px 28px}
  .lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(238,242,251,.5);font-weight:700;margin-bottom:14px}
  .row{display:flex;gap:18px}
  .curve{flex:1;background:#11141c;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px}
  .curve svg{width:100%;height:64px;display:block}
  .cn{font-family:'JetBrains Mono',monospace;font-size:11px;color:#9BD1FF;margin-top:8px}
  .stag{margin-top:18px}
  .track{display:flex;flex-direction:column;gap:8px}
  .bar{height:18px;border-radius:5px;background:#5B8CFF;opacity:.9}
  .sl{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(238,242,251,.55);margin-bottom:6px;letter-spacing:.08em}
</style></head>
<body>
  <div class="lab">Pure function of t · quick staggered entrance (~300ms apart) → steady hold</div>
  <div class="row">
    <div class="curve"><svg viewBox="0 0 100 50" preserveAspectRatio="none"><path d="M0 50 C 25 8, 55 0, 100 0" fill="none" stroke="#9BD1FF" stroke-width="2.5"/></svg><div class="cn">easeOutCubic — settle</div></div>
    <div class="curve"><svg viewBox="0 0 100 50" preserveAspectRatio="none"><path d="M0 50 C 30 -14, 70 -14, 100 0" fill="none" stroke="#9BD1FF" stroke-width="2.5"/></svg><div class="cn">easeOutBack — pop</div></div>
    <div class="curve"><svg viewBox="0 0 100 50" preserveAspectRatio="none"><path d="M0 50 C 50 50, 50 0, 100 0" fill="none" stroke="#9BD1FF" stroke-width="2.5"/></svg><div class="cn">easeInOut — fade</div></div>
  </div>
  <div class="stag">
    <div class="sl">STAGGER — icon · number · chip enter ~300ms apart</div>
    <div class="track">
      <div class="bar" style="width:96%"></div>
      <div class="bar" style="width:82%;margin-left:8%"></div>
      <div class="bar" style="width:66%;margin-left:16%"></div>
    </div>
  </div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#14161B;padding:28px}
  .lab{font-family:'Inter';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#9b9ea4;font-weight:600}
  .big{font-weight:900;font-size:58px;letter-spacing:-0.03em;line-height:1;margin-top:6px}
  .weights{display:flex;gap:22px;align-items:baseline;margin-top:20px;flex-wrap:wrap}
  .w{font-size:30px}
  .wl{display:block;font-size:11px;color:#9b9ea4;font-weight:500;margin-top:2px;letter-spacing:.04em}
</style></head>
<body>
  <div class="lab">Inter — intentional default brand font</div>
  <div class="big">Heavy weight, tight tracking</div>
  <div class="weights">
    <div><span class="w" style="font-weight:400">Regular</span><span class="wl">400</span></div>
    <div><span class="w" style="font-weight:500">Medium</span><span class="wl">500</span></div>
    <div><span class="w" style="font-weight:600">Semibold</span><span class="wl">600</span></div>
    <div><span class="w" style="font-weight:700">Bold</span><span class="wl">700</span></div>
    <div><span class="w" style="font-weight:800">Extrabold</span><span class="wl">800</span></div>
    <div><span class="w" style="font-weight:900">Black</span><span class="wl">900</span></div>
  </div>
</body></html>

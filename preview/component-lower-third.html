<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:radial-gradient(ellipse 90% 80% at 50% 30%,#2a2d35,#15171c 75%);padding:34px 30px;display:flex;align-items:center;min-height:100%}
  .lt{display:flex;align-items:stretch}
  .bracket{width:12px;background:#4F7CF7}
  .lbody{background:#14161B;padding:20px 44px 20px 30px;display:flex;align-items:center;gap:28px}
  .num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:58px;color:#4F7CF7;line-height:.9;letter-spacing:-0.04em}
  .num .s{opacity:.5}
  .txt{display:flex;flex-direction:column;gap:7px}
  .k{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .t{font-weight:800;font-size:46px;color:#fff;letter-spacing:-0.01em;line-height:1}
</style></head>
<body>
  <div class="lt">
    <div class="bracket"></div>
    <div class="lbody">
      <div class="num">01<span class="s">/</span></div>
      <div class="txt"><div class="k">CHAPTER</div><div class="t">Getting Started</div></div>
    </div>
  </div>
</body></html>

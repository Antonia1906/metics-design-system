<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#F4F2EC;color:#14161B;padding:28px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:14px;height:118px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;border:1px solid rgba(0,0,0,.07)}
  .name{font-weight:700;font-size:14px}
  .hex{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;opacity:.85;margin-top:3px}
  .on-dark .name,.on-dark .hex{color:#fff}
  .cap{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9b8f78;margin-top:16px}
</style></head>
<body>
  <div class="row">
    <div class="sw on-dark" style="background:#4F7CF7"><div class="name">accent</div><div class="hex">#4F7CF7</div></div>
    <div class="sw on-dark" style="background:#F2A65A"><div class="name">accent-2</div><div class="hex">#F2A65A</div></div>
    <div class="sw on-dark" style="background:#14161B"><div class="name">bg-dark (cards)</div><div class="hex">#14161B</div></div>
    <div class="sw" style="background:#F4F2EC"><div class="name">bg-light (paper)</div><div class="hex">#F4F2EC</div></div>
  </div>
  <div class="cap">Light / warm — cream paper, blue + warm-orange · Manrope + JetBrains Mono</div>
</body></html>

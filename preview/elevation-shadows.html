<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(ellipse 80% 70% at 50% 40%,#11141c,#07080d 70%);color:#EEF2FB;padding:30px 28px}
  .row{display:flex;gap:30px;align-items:center;justify-content:space-around}
  .item{text-align:center}
  .mark{width:84px;height:84px;border-radius:24px;background:linear-gradient(160deg,#9BD1FF,#5B8CFF);box-shadow:0 26px 70px rgba(91,140,255,.45),inset 0 2px 0 rgba(255,255,255,.4);margin:0 auto}
  .ico{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;color:#9BD1FF;filter:drop-shadow(0 12px 40px rgba(91,140,255,.5));margin:0 auto}
  .ico svg{width:48px;height:48px}
  .numwrap{font-weight:800;font-size:54px;color:#EEF2FB;text-shadow:0 10px 60px rgba(0,0,0,.7)}
  .nm{font-weight:700;font-size:12px;margin-top:14px}
  .vl{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(238,242,251,.5);margin-top:3px;max-width:170px}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="mark"></div><div class="nm">Accent-tinted drop</div><div class="vl">0 26px 70px accent/45%</div></div>
    <div class="item"><div class="ico"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 32l10-10 8 7 12-15"/><path d="M30 14h8v8"/></svg></div><div class="nm">Icon glow</div><div class="vl">drop-shadow 0 12px 40px</div></div>
    <div class="item"><div class="numwrap">5%</div><div class="nm">Number legibility</div><div class="vl">text-shadow 0 10px 60px black/55%</div></div>
  </div>
</body></html>

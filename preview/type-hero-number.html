<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0A0C12;color:#EEF2FB;padding:26px 28px;overflow:hidden}
  .lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(238,242,251,.5);font-weight:700}
  .num{font-weight:800;font-size:150px;line-height:.86;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;text-shadow:0 10px 60px rgba(0,0,0,.55);margin-top:4px}
  .num .unit{font-size:.4em;color:#9BD1FF;margin-left:6px}
  .row{display:flex;align-items:baseline;gap:40px}
  .small{font-weight:800;font-size:64px;letter-spacing:-0.02em}
  .small .u{color:#5B8CFF}
</style></head>
<body>
  <div class="lab">Hero number — the loudest element · tabular-nums · −2% tracking</div>
  <div class="row">
    <div class="num">$1,000,000</div>
  </div>
  <div class="row" style="margin-top:2px">
    <div class="small">5<span class="u">%</span></div>
    <div class="small">3<span class="u">×</span></div>
    <div class="small">5</div>
  </div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'JetBrains Mono',monospace;background:#14161B;color:#fff;padding:24px 28px}
  .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:700;margin-bottom:16px}
  .wall{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
  .wall img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.4))}
</style></head>
<body>
  <div class="lab">Flat-emoji PNGs — language-neutral callout icons (dropped in as &lt;img&gt;, not typed)</div>
  <div class="wall">
    <img src="../assets/Emojis/white_check_mark.png" alt="check">
    <img src="../assets/Emojis/fire.png" alt="fire">
    <img src="../assets/Emojis/lock.png" alt="lock">
    <img src="../assets/Emojis/link.png" alt="link">
    <img src="../assets/Emojis/moneybag.png" alt="money">
    <img src="../assets/Emojis/trophy.png" alt="trophy">
    <img src="../assets/Emojis/bulb.png" alt="bulb">
    <img src="../assets/Emojis/sparkles.png" alt="sparkles">
    <img src="../assets/Emojis/stopwatch.png" alt="stopwatch">
    <img src="../assets/Emojis/tada.png" alt="tada">
    <img src="../assets/Emojis/medal.png" alt="medal">
    <img src="../assets/Emojis/heart.png" alt="heart">
  </div>
</body></html>

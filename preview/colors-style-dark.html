<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(ellipse 80% 70% at 50% 40%,#11141c,#07080d 70%);color:#EEF2FB;padding:28px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:14px;height:118px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;border:1px solid rgba(255,255,255,.1)}
  .name{font-weight:700;font-size:14px}
  .hex{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;opacity:.85;margin-top:3px}
  .on-dark .name,.on-dark .hex{color:#06101f}
  .cap{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(238,242,251,.5);margin-top:16px}
</style></head>
<body>
  <div class="row">
    <div class="sw on-dark" style="background:#5B8CFF"><div class="name">accent</div><div class="hex">#5B8CFF</div></div>
    <div class="sw on-dark" style="background:#9BD1FF"><div class="name">accent-2</div><div class="hex">#9BD1FF</div></div>
    <div class="sw" style="background:#0A0C12;border-color:rgba(255,255,255,.16)"><div class="name">bg-dark</div><div class="hex">#0A0C12</div></div>
    <div class="sw on-dark" style="background:#EEF2FB"><div class="name">text-on-dark</div><div class="hex">#EEF2FB</div></div>
  </div>
  <div class="cap">Dark / cinematic — glow-blue on near-black · Instrument Serif display</div>
</body></html>

<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0A0C12;color:#EEF2FB;padding:28px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .cell{border-radius:12px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between}
  .nm{font-weight:700;font-size:13px}
  .hex{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;opacity:.8;margin-top:2px}
  .desc{font-size:11px;opacity:.6}
  .chip{display:inline-flex;align-items:center;gap:9px;padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;backdrop-filter:blur(6px)}
  .dot{width:9px;height:9px;border-radius:50%;background:#5B8CFF}
</style></head>
<body>
  <div class="grid">
    <div class="cell" style="background:#11141c;border:1px solid #fff"><div><div class="nm" style="color:#EEF2FB">text-on-dark</div><div class="hex">#EEF2FB</div></div><div class="desc">Primary text on dark</div></div>
    <div class="cell" style="background:#11141c;border:1px solid rgba(255,255,255,.14)"><div><div class="nm" style="color:rgba(238,242,251,.6)">muted-on-dark</div><div class="hex">white / 60%</div></div><div class="desc">Captions, kickers</div></div>
    <div class="cell" style="background:#11141c"><div><div class="nm">hairline</div><div class="hex">#323334</div></div><div style="border-top:1px solid #323334;margin-top:8px"></div><div class="desc">Dividers on dark</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;margin-top:18px">
    <span class="chip"><span class="dot"></span>LABEL</span>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.6">chip-bg <b>white/8%</b> · chip-border <b>white/14%</b> · backdrop-blur(6px)</div>
  </div>
</body></html>

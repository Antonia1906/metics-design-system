<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'JetBrains Mono',monospace;background:#F7F7F8;color:#14161B;padding:24px 28px}
  .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9b9ea4;font-weight:700;margin-bottom:16px}
  .wall{display:flex;flex-wrap:wrap;gap:16px;align-items:center}
  .tile{height:62px;background:#fff;border:1px solid #ececec;border-radius:14px;display:grid;place-items:center;padding:0 20px}
  .tile img{max-height:34px;max-width:120px;display:block}
  .tile.dk{background:#0A0A0A;border-color:#222}
</style></head>
<body>
  <div class="lab">Real product logos — used as-is, never redrawn · the per-video skin source</div>
  <div class="wall">
    <div class="tile"><img src="../assets/Logos/Claude/Claude_AI_logo.png" alt="Claude"></div>
    <div class="tile"><img src="../assets/Logos/Cursor/Cursor_logo.png" alt="Cursor"></div>
    <div class="tile"><img src="../assets/Logos/ChatGPT/ChatGPT-Logo.png" alt="ChatGPT"></div>
    <div class="tile"><img src="../assets/Logos/Notion/Notion-logo.png" alt="Notion"></div>
    <div class="tile"><img src="../assets/Logos/Stripe/Stripe wordmark - Blurple - Large.png" alt="Stripe"></div>
    <div class="tile"><img src="../assets/Logos/Docker/docker_icon.png" alt="Docker"></div>
    <div class="tile"><img src="../assets/Logos/Telegram/Telegram_logo.png" alt="Telegram"></div>
    <div class="tile dk"><img src="../assets/Logos/GitHub/GitHub_Invertocat_White.png" alt="GitHub"></div>
  </div>
</body></html>

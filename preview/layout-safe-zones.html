<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#14161B;padding:24px 28px}
  .lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9b9ea4;font-weight:700;margin-bottom:12px}
  .frame{position:relative;width:100%;aspect-ratio:16/9;background:#11141c;border-radius:10px;overflow:hidden}
  .safe{position:absolute;inset:5%;border:1.5px dashed rgba(91,140,255,.7);border-radius:4px}
  .safelab{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:#5B8CFF;letter-spacing:.1em}
  .face{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:34%;height:62%;background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.14),transparent 70%);border-radius:50% 50% 0 0}
  .facelab{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4)}
  .lt{position:absolute;left:7%;bottom:11%;display:flex;align-items:stretch;gap:14px}
  .bar{width:7px;background:#4F7CF7;border-radius:3px}
  .body{background:#000;padding:8px 14px;border-radius:2px}
  .ltt{color:#fff;font-weight:800;font-size:14px}
  .ltk{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.5)}
  .cap{position:absolute;left:0;right:0;bottom:3%;height:5%;background:rgba(255,255,255,.06);border-top:1px dashed rgba(255,255,255,.18)}
</style></head>
<body>
  <div class="lab">1920×1080 → scales to 4K · safe = 96px (5%) inset · lower-third bottom ~110px</div>
  <div class="frame">
    <div class="safe"></div>
    <div class="safelab">SAFE 5%</div>
    <div class="face"></div>
    <div class="facelab">keep center / lower-left clear (presenter)</div>
    <div class="lt"><div class="bar"></div><div class="body"><div class="ltk">CHAPTER</div><div class="ltt">Lower third</div></div></div>
    <div class="cap"></div>
  </div>
</body></html>

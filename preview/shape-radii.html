<!-- @dsCard group="Spacing" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#14161B;padding:28px}
  .row{display:flex;gap:22px;align-items:flex-end}
  .item{text-align:center}
  .box{background:#14161B;border:2px solid #4F7CF7}
  .pill{width:150px;height:64px;border-radius:9999px;background:#4F7CF7}
  .card{width:120px;height:96px;border-radius:28px}
  .mark{width:96px;height:96px;border-radius:38px;background:linear-gradient(160deg,#9BD1FF,#5B8CFF)}
  .nm{font-weight:700;font-size:13px;margin-top:12px}
  .vl{font-family:'JetBrains Mono',monospace;font-size:11px;color:#9b9ea4;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="pill"></div><div class="nm">pill</div><div class="vl">9999px</div></div>
    <div class="item"><div class="box card"></div><div class="nm">card</div><div class="vl">28px</div></div>
    <div class="item"><div class="mark"></div><div class="nm">mark</div><div class="vl">38px</div></div>
  </div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Roboto',system-ui,sans-serif;background:#0F0F0F;color:#F1F1F1;padding:22px 24px}
  .title{font-weight:700;font-size:20px;letter-spacing:-.2px;line-height:1.3}
  .row{display:flex;align-items:center;gap:10px;margin-top:12px}
  .av{width:34px;height:34px;border-radius:50%;background:#111;display:grid;place-items:center;border:1px solid #333;flex-shrink:0}
  .av img{width:20px;height:20px}
  .name{display:flex;align-items:center;gap:5px;font-weight:500;font-size:14px;white-space:nowrap}
  .name svg{flex-shrink:0}
  .subs{color:#AAA;font-size:11px;margin-top:1px}
  .bell{margin-left:auto;background:#272727;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;flex-shrink:0}
  .bell svg{width:14px;height:14px}
  .desc{position:relative;margin-top:12px;background:#1F1F1F;border-radius:10px;padding:14px 16px}
  .views{font-weight:500;font-size:12px;color:#AAA}
  .aff{margin-top:12px;font-size:13px;line-height:1.5;display:flex;align-items:flex-start;gap:9px;position:relative}
  .aff img{width:16px;height:16px;margin-top:1px;position:relative;z-index:1;flex-shrink:0}
  .aff .copy{position:relative;z-index:1}
  .hl{position:absolute;inset:-6px -8px;border-radius:7px;background:rgba(251,65,28,.16);border:2px solid #FB411C;z-index:0;pointer-events:none}
  .lnk{color:#3EA6FF}
</style></head>
<body>
  <div class="title">Coveron Review: Best Identity Theft Protection?</div>
  <div class="row">
    <div class="av"><img src="../assets/Logos/MeticsMedia/icon_white.png" alt="Metics"></div>
    <div>
      <div class="name">Metics Media
        <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10" fill="#717171"/><path d="M10.1 15.2l-2.9-2.9 1.25-1.25 1.65 1.65 4.4-4.4 1.25 1.25z" fill="#fff"/></svg>
      </div>
      <div class="subs">600K subscribers</div>
    </div>
    <div class="bell"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 22a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 22zm7-6v-5a7 7 0 10-14 0v5l-2 2v1h18v-1z"/></svg>Subscribed</div>
  </div>
  <div class="desc">
    <div class="views">52,847 views</div>
    <div class="aff">
      <img src="../assets/Emojis/white_check_mark.png" alt="check">
      <span class="copy"><b>Coveron (Exclusive Discount):</b> <span class="lnk">https://meticsmedia.com/coveron-QQH</span></span>
      <div class="hl"></div>
    </div>
  </div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:radial-gradient(ellipse 70% 60% at 50% 40%,#11141c,#07080d 70%);padding:32px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;min-height:100%}
  .head{font-weight:900;font-size:60px;letter-spacing:-0.02em;line-height:.9;color:#fff}
  .btn{display:inline-flex;align-items:center;gap:14px;background:#4F7CF7;color:#fff;font-weight:800;font-size:22px;letter-spacing:.14em;text-transform:uppercase;padding:16px 36px;border-radius:999px}
  .arr{width:12px;height:12px;border-radius:3px;background:#fff;flex-shrink:0}
  .sub{font-family:'Manrope';font-size:13px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.4);text-transform:uppercase}
</style></head>
<body>
  <div class="head">Subscribe</div>
  <div class="btn"><span class="arr"></span>SUBSCRIBE</div>
  <div class="sub">youtube.com/@meticsmedia</div>
</body></html>

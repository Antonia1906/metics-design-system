<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#14161B;color:#fff;padding:26px 28px}
  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:700;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;letter-spacing:.2em;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:#FB411C}
  .chips{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .kick{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:22px}
  .num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:40px;letter-spacing:-0.04em;margin-top:4px}
  .num .s{opacity:.5}
</style></head>
<body>
  <div class="meta">One uppercase word on a chip — the only sanctioned text block (localizes without re-render)</div>
  <div class="chips">
    <span class="chip"><span class="dot"></span>SECURE</span>
    <span class="chip"><span class="dot" style="background:#FAC900"></span>FREE</span>
    <span class="chip"><span class="dot" style="background:#4F7CF7"></span>STEP</span>
  </div>
  <div class="kick">CHAPTER · KICKER</div>
  <div class="num">01<span class="s">/</span></div>
</body></html>

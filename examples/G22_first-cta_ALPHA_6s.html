<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>G22 First CTA — Coveron — ALPHA — 6s</title>
<!-- CUE G22 · FIRST CTA · ALPHA · 6s · covers TH "5% off auto-applied via the link".
     Built from _template.html with tokens.coveron.css. Number-led, minimal text. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== BRAND TOKENS (Coveron) ===== */
:root{
  --accent:#FB411C; --accent-deep:#9E270F; --bg-dark:#0A0A0A; --bg-light:#F7F7F8;
  --text-on-dark:#FFFFFF; --text-on-light:#2A2A2A; --muted:#5A5C5F;
  --font-display:'Inter',system-ui,sans-serif; --font-body:'Inter',system-ui,sans-serif;
  --radius-pill:9999px; --safe:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:var(--font-body);color:var(--text-on-dark);-webkit-font-smoothing:antialiased}
#host{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.stage{position:relative;width:1920px;height:1080px;transform-origin:center center;overflow:hidden}
html[data-review="black"] body{background:#000}
html[data-review="alpha"] body{background:conic-gradient(#1a1a1a 0% 25%,#242427 25% 50%,#1a1a1a 50% 75%,#242427 75% 100%);background-size:80px 80px}
.transport{position:fixed;left:0;right:0;bottom:0;height:42px;display:none;align-items:center;gap:14px;padding:0 16px;z-index:9999;background:rgba(10,10,12,.82);color:#cfd2d6;font:600 13px/1 var(--font-body)}
html[data-preview="1"] .transport{display:flex}
.transport button{all:unset;cursor:pointer;padding:4px 10px;border-radius:6px;background:#26272b}.transport input{flex:1}

/* CTA cluster — sits lower-right so it clears the on-camera face */
.cta{position:absolute;right:140px;bottom:150px;display:flex;flex-direction:column;align-items:center;gap:26px}
.badge{display:flex;align-items:baseline;gap:10px;background:var(--accent);color:#fff;
       padding:28px 46px;border-radius:36px;box-shadow:0 24px 60px rgba(251,65,28,.35)}
.badge .pct{font:900 150px/0.8 var(--font-display);letter-spacing:-0.04em}
.badge .off{font:800 52px/1 var(--font-display);letter-spacing:.02em}
.arrow{color:var(--accent)}
.pill{font:800 34px/1 var(--font-display);letter-spacing:.06em;color:#fff;background:rgba(10,10,12,.86);
      border:2px solid var(--accent);padding:18px 34px;border-radius:var(--radius-pill);backdrop-filter:blur(6px)}
</style>
</head>
<body>
  <div id="host"><div class="stage" id="stage">
    <div class="cta" id="cta">
      <div class="badge" id="badge"><span class="pct" id="pct">5%</span><span class="off">OFF</span></div>
      <svg class="arrow" id="arrow" width="64" height="74" viewBox="0 0 64 74" fill="none">
        <path d="M32 4 V60 M14 44 L32 64 L50 44" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="pill" id="pill">FIRST LINK BELOW</div>
    </div>
  </div></div>
  <div class="transport">
    <button onclick="playStory()">▶</button><button onclick="pauseStory()">❚❚</button>
    <input type="range" min="0" max="1000" value="0" oninput="setStoryTime(this.value/1000*STORY_DURATION)">
    <span id="tc">0.00</span>
  </div>
<script>
const clamp01=u=>Math.max(0,Math.min(1,u));
const easeOutCubic=u=>1-Math.pow(1-clamp01(u),3);
const easeInCubic=u=>Math.pow(clamp01(u),3);
const easeOutBack=(u,s=1.6)=>{u=clamp01(u);return 1+(s+1)*Math.pow(u-1,3)+s*Math.pow(u-1,2)};
const lerp=(t,a,b,v0,v1,e=easeOutCubic)=>{if(t<=a)return v0;if(t>=b)return v1;return v0+(v1-v0)*e((t-a)/(b-a))};
const visible=(t,tin,tout,fi=0.4,fo=0.5)=>{if(t<tin||t>tout)return 0;if(t<tin+fi)return easeOutCubic((t-tin)/fi);if(t>tout-fo)return 1-easeInCubic((t-(tout-fo))/fo);return 1};

/* (1) CONFIG */
const STORY_DURATION=6.0, STORY_FPS=30, STAGE_BG='transparent';
const STORY_BEATS=[{id:'badge',in:0.0,out:6.0},{id:'arrow',in:0.5,out:6.0},{id:'pill',in:0.9,out:6.0}];

/* (2) BUILD + RENDER */
const stage=document.getElementById('stage');
if(STAGE_BG!=='transparent')stage.setAttribute('data-bg',STAGE_BG);
const cta=document.getElementById('cta'),badge=document.getElementById('badge'),
      arrow=document.getElementById('arrow'),pill=document.getElementById('pill');
function render(t){
  cta.style.opacity = visible(t,0,STORY_DURATION,0.3,0.5);
  // badge pops in with overshoot
  const bs = lerp(t,0.0,0.55,0.6,1,easeOutBack);
  badge.style.transform = `scale(${bs})`;
  // down-arrow bounces gently (continuous life), fades in after badge
  const aop = lerp(t,0.5,0.85,0,1);
  const bob = Math.sin(Math.max(0,t-0.85)*4.2)*6;
  arrow.style.opacity = aop;
  arrow.style.transform = `translateY(${lerp(t,0.5,0.85,-14,0)+bob}px)`;
  // pill slides up
  pill.style.opacity = lerp(t,0.9,1.3,0,1);
  pill.style.transform = `translateY(${lerp(t,0.9,1.4,18,0,easeOutBack)}px)`;
}

/* HARNESS — do not edit */
let _t=0,_p=false,_r=null,_l=0;
function setStoryTime(s){_p=false;cancelAnimationFrame(_r);_t=Math.max(0,Math.min(STORY_DURATION,s));render(_t);_tc()}
function playStory(){if(_p)return;_p=true;_l=performance.now();_lp()}
function pauseStory(){_p=false;cancelAnimationFrame(_r)}
function _lp(){const n=performance.now();_t+=(n-_l)/1000;_l=n;if(_t>=STORY_DURATION){_t=STORY_DURATION;render(_t);_p=false;_tc();return}render(_t);_tc();_r=requestAnimationFrame(_lp)}
function _tc(){const e=document.getElementById('tc');if(e)e.textContent=_t.toFixed(2)}
window.setStoryTime=setStoryTime;window.playStory=playStory;window.pauseStory=pauseStory;
window.STORY_DURATION=STORY_DURATION;window.STORY_FPS=STORY_FPS;window.STORY_BEATS=STORY_BEATS;
function _fit(){stage.style.transform=`scale(${Math.min(innerWidth/1920,innerHeight/1080)})`}addEventListener('resize',_fit);_fit();
const P=new URLSearchParams(location.search);
if(P.get('preview')==='1')document.documentElement.setAttribute('data-preview','1');
if(P.get('bg'))document.documentElement.setAttribute('data-review',P.get('bg'));
const T0=parseFloat(P.get('t'));
render(0); if(isFinite(T0))setStoryTime(T0); else if(P.get('autoplay')!=='0')playStory();
window.__storyReady=true;
</script>
</body>
</html>

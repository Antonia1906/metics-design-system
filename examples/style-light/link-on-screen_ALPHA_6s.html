<!doctype html>
<!-- ============================================================
     ARCHETYPE : link-on-screen (clean URL banner)
     OUTPUT    : ALPHA overlay  (STAGE_BG = 'transparent')
     DURATION  : 6.0s
     Suggested filename: link-on-screen_ALPHA_6s.html
     Plain vanilla JS. Animation is a pure function of `t` (seconds).
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Link On Screen — ALPHA — 6s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* ===================== BRAND TOKENS ====================== */
    --accent:        #4F7CF7;
    --accent-2:      #F2A65A;
    --bg-dark:       #14161B;
    --bg-light:      #F4F2EC;
    --text-on-dark:  #FFFFFF;
    --text-on-light: #14161B;
    --muted-on-dark: rgba(255,255,255,0.52);
    --font-display:  'Manrope', system-ui, sans-serif;
    --font-mono:     'JetBrains Mono', ui-monospace, monospace;
    /* ======================================================== */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--font-display); }

  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
  .stage-host { flex: 1; position: relative; overflow: hidden;
                display: flex; align-items: center; justify-content: center; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: center center; overflow: hidden; flex-shrink: 0; }

  /* ---------- component: link banner (lower third, centered) ---------- */
  .lk-wrap { position: absolute; left: 0; right: 0; bottom: 150px;
             display: flex; justify-content: center; will-change: transform, opacity; }
  .lk { display: inline-flex; align-items: center; gap: 28px;
        background: var(--bg-dark); padding: 26px 44px; border-radius: 18px;
        position: relative; }
  .lk-glyph { width: 56px; height: 56px; flex-shrink: 0; }
  .lk-glyph svg { width: 100%; height: 100%; }
  .lk-url { font-family: var(--font-mono); font-weight: 700; font-size: 52px;
            letter-spacing: -0.01em; display: inline-flex; align-items: baseline; white-space: nowrap; }
  .lk-host, .lk-path { white-space: nowrap; }
  .lk-host { color: var(--text-on-dark); }
  .lk-path { color: var(--accent); }
  .lk-caret { display: inline-block; width: 4px; height: 46px; background: var(--accent);
              margin-left: 8px; transform: translateY(6px); }
  .lk-under { position: absolute; left: 44px; bottom: 18px; height: 6px;
              background: var(--accent); border-radius: 3px; transform-origin: left center; }

  /* ---------- preview chrome ---------- */
  .preview-bar { display: none; }
  body.preview .preview-bar {
    display: flex; align-items: center; gap: 14px; height: 56px; padding: 0 18px;
    background: #0c0d11; border-top: 1px solid rgba(255,255,255,.08);
    font-family: var(--font-mono); color: #cfd2d8; flex-shrink: 0; }
  .pv-play { width: 34px; height: 34px; border-radius: 50%; border: none;
             background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; }
  .pv-time, .pv-dur { font-size: 12px; min-width: 42px; }
  .pv-dur { color: rgba(255,255,255,.45); }
  .pv-track { flex: 1; height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; position: relative; cursor: pointer; }
  .pv-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--accent); border-radius: 3px; }
  .pv-thumb { position: absolute; top: 50%; left: 0; width: 13px; height: 13px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%); }

  /* ============ RENDER MODE OVERRIDES ============ */
  html, body { background: transparent; }
  .stage-host { background: transparent; }
  body.preview .stage-host { background: #0a0b0e; }
  html[data-bg="black"] .stage-host { background: #000; }
  html[data-bg="wall"]  .stage-host { background: radial-gradient(ellipse 80% 60% at 50% 35%, #FBF8F1, #EDE7DC 60%, #DDD5C5); }
  html[data-bg="alpha"] .stage-host { background: conic-gradient(#1a1a1a 0% 25%, #242427 25% 50%, #1a1a1a 50% 75%, #242427 75% 100%); background-size: 80px 80px; }
</style>
</head>
<body>
<div id="app">
  <div class="stage-host">
    <div class="stage" id="stage">
      <div class="lk-wrap" id="lkWrap">
        <div class="lk" id="lk">
          <div class="lk-glyph" id="lkGlyph">
            <svg viewBox="0 0 100 100" fill="none">
              <circle cx="38" cy="50" r="17" stroke="var(--text-on-dark)" stroke-width="7"/>
              <circle cx="62" cy="50" r="17" stroke="var(--accent)" stroke-width="7"/>
            </svg>
          </div>
          <div class="lk-url">
            <span class="lk-host" id="lkHost">example.site</span><span class="lk-path" id="lkPath">/your-link</span><span class="lk-caret" id="lkCaret"></span>
          </div>
          <div class="lk-under" id="lkUnder"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="preview-bar">
    <button class="pv-play" id="pvPlay">&#9658;</button>
    <div class="pv-time" id="pvTime">0:00</div>
    <div class="pv-track" id="pvTrack"><div class="pv-fill" id="pvFill"></div><div class="pv-thumb" id="pvThumb"></div></div>
    <div class="pv-dur" id="pvDur">0:00</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ===================== CONFIG ===================== */
  const STAGE_BG = 'transparent';          // ALPHA overlay
  const DURATION = 6.0;
  const FPS = 30;
  const BEATS = [{ id: 1, in: 0.0, out: 6.0, label: 'link' }];

  /* ===================== HELPERS (pure t-driven) ===================== */
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const clamp01 = v => clamp(v, 0, 1);
  const easeOutCubic = u => 1 - Math.pow(1 - clamp01(u), 3);
  const easeInCubic  = u => Math.pow(clamp01(u), 3);
  const easeOutQuint = u => 1 - Math.pow(1 - clamp01(u), 5);
  const easeOutBack  = (u, s = 1.4) => { u = clamp01(u); return 1 + (s + 1) * Math.pow(u - 1, 3) + s * Math.pow(u - 1, 2); };
  const lerp = (t, t0, t1, v0, v1, ease = easeOutCubic) => {
    if (t <= t0) return v0; if (t >= t1) return v1;
    return v0 + (v1 - v0) * ease((t - t0) / (t1 - t0));
  };
  const set = (el, o = {}) => {
    el.style.opacity = (o.o == null ? 1 : o.o);
    el.style.transform = `translate(${o.x || 0}px,${o.y || 0}px) scale(${o.s == null ? 1 : o.s})`;
  };
  const fmt = s => { s = Math.max(0, s); const m = Math.floor(s / 60), ss = Math.floor(s % 60); return m + ':' + String(ss).padStart(2, '0'); };

  /* ===================== HARNESS ===================== */
  const P = new URLSearchParams(location.search);
  const host = document.querySelector('.stage-host');
  const stage = document.getElementById('stage');
  stage.style.background = STAGE_BG === 'solid-dark' ? 'var(--bg-dark)' : STAGE_BG === 'solid-light' ? 'var(--bg-light)' : 'transparent';
  const bgParam = P.get('bg'); if (bgParam) document.documentElement.setAttribute('data-bg', bgParam);
  const PREVIEW = P.get('preview') === '1'; if (PREVIEW) document.body.classList.add('preview');
  const fit = () => { stage.style.transform = 'scale(' + Math.min(host.clientWidth / 1920, host.clientHeight / 1080) + ')'; };
  new ResizeObserver(fit).observe(host); fit();

  const lkWrap = document.getElementById('lkWrap'),
        lkGlyph = document.getElementById('lkGlyph'),
        lkHost = document.getElementById('lkHost'),
        lkPath = document.getElementById('lkPath'),
        lkCaret = document.getElementById('lkCaret'),
        lkUnder = document.getElementById('lkUnder');

  /* ===================== STATE ===================== */
  const initialT = parseFloat(P.get('t'));
  const hasT = isFinite(initialT);
  let t = hasT ? clamp(initialT, 0, DURATION) : 0;
  let playing = P.get('autoplay') !== '0' && !hasT;
  let last = null;

  /* ===================== RENDER — pure function of t ===================== */
  function render(t) {
    const exit  = lerp(t, DURATION - 0.5, DURATION - 0.12, 0, 1, easeInCubic);
    const inO   = lerp(t, 0.1, 0.6, 0, 1);
    set(lkWrap, { o: inO * (1 - exit), y: lerp(t, 0.1, 0.6, 30, 0, easeOutQuint) + exit * 16 });

    set(lkGlyph, { o: lerp(t, 0.25, 0.7, 0, 1), s: lerp(t, 0.25, 0.8, 0.5, 1, easeOutBack) });
    lkHost.style.opacity = lerp(t, 0.35, 0.75, 0, 1);
    lkPath.style.opacity = lerp(t, 0.6, 1.0, 0, 1);

    lkUnder.style.width = '300px';
    lkUnder.style.transform = `scaleX(${lerp(t, 0.9, 1.6, 0, 1, easeOutCubic)})`;
    lkUnder.style.opacity = lerp(t, 0.9, 1.2, 0, 1) * (1 - exit);

    // blinking caret after the path lands (deterministic: derived from t)
    const caretShown = t > 1.0 && t < DURATION - 0.5;
    lkCaret.style.opacity = caretShown ? (Math.sin(t * 7) > 0 ? 1 : 0.05) : 0;

    updatePreview(t);
  }

  /* ===================== PREVIEW BAR ===================== */
  let pvPlay, pvFill, pvThumb, pvTime;
  if (PREVIEW) {
    pvPlay = document.getElementById('pvPlay'); pvFill = document.getElementById('pvFill');
    pvThumb = document.getElementById('pvThumb'); pvTime = document.getElementById('pvTime');
    document.getElementById('pvDur').textContent = fmt(DURATION);
    pvPlay.onclick = () => { playing = !playing; };
    const track = document.getElementById('pvTrack'); let drag = false;
    const seek = e => { const r = track.getBoundingClientRect(); window.setStoryTime(clamp01((e.clientX - r.left) / r.width) * DURATION); };
    track.addEventListener('mousedown', e => { drag = true; seek(e); });
    window.addEventListener('mousemove', e => { if (drag) seek(e); });
    window.addEventListener('mouseup', () => drag = false);
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); playing = !playing; }
      else if (e.code === 'ArrowLeft')  window.setStoryTime(t - (e.shiftKey ? 1 : 1 / FPS));
      else if (e.code === 'ArrowRight') window.setStoryTime(t + (e.shiftKey ? 1 : 1 / FPS));
    });
  }
  function updatePreview(tt) {
    if (!PREVIEW) return;
    const u = DURATION ? tt / DURATION : 0;
    pvFill.style.width = (u * 100) + '%';
    pvThumb.style.left = (u * 100) + '%';
    pvTime.textContent = fmt(tt);
    pvPlay.innerHTML = playing ? '&#10074;&#10074;' : '&#9658;';
  }

  /* ===================== LOOP ===================== */
  function frame(now) {
    if (playing) { if (last == null) last = now; const dt = (now - last) / 1000; last = now; t += dt; if (t >= DURATION) t = t % DURATION; }
    else last = null;
    render(t);
    requestAnimationFrame(frame);
  }
  render(t);
  requestAnimationFrame(frame);

  /* ===================== WINDOW API ===================== */
  window.setStoryTime = s => { playing = false; last = null; t = clamp(s, 0, DURATION); render(t); };
  window.playStory  = () => { playing = true; };
  window.pauseStory = () => { playing = false; };
  window.STORY_DURATION = DURATION;
  window.STORY_FPS = FPS;
  window.STORY_BEATS = BEATS;
  window.__storyReady = true;
})();
</script>
</body>
</html>
